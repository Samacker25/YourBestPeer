          PID=$!
          sleep 3
          curl --fail http://localhost:8012/health || (kill $PID && exit 1)
          kill $PID

  integration:
    name: "Integration › docker-compose health check"
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - auth-service
      - ai-agent-service
      - productivity-service
      - finance-service
      - habit-service
      - analytics-service
      - recommendation-service
      - notification-service
      - rag-service
      - career-service
      - integrations-service
      - automation-service
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          POSTGRES_USER=lifeos
          POSTGRES_PASSWORD=lifeos_ci
          POSTGRES_DB=lifeos
          JWT_SECRET=ci_test_secret_32_chars_minimum!!
          GOOGLE_API_KEY=dummy
          TAVILY_API_KEY=dummy
          LANGCHAIN_TRACING_V2=false
          LANGCHAIN_API_KEY=dummy
          LANGCHAIN_PROJECT=yourbestpeer-ci
          PINECONE_API_KEY=dummy
          PINECONE_ENVIRONMENT=us-east-1-aws
          PINECONE_INDEX_NAME=lifeos
          SMTP_HOST=
          SMTP_USER=
          SMTP_PASS=
          TELEGRAM_BOT_TOKEN=
          EOF

      - name: Start infrastructure + all services
        run: docker-compose up -d --build
        timeout-minutes: 10

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            docker-compose exec -T postgres pg_isready -U lifeos && break
            echo "Waiting for postgres... ($i/30)"
            sleep 2
          done

      - name: Wait for services to boot
        run: sleep 15

      - name: Health check — auth-service
        run: curl --fail --retry 5 --retry-delay 3 http://localhost:8001/health

      - name: Health check — ai-agent-service
        run: curl --fail --retry 5 --retry-delay 3 http://localhost:8002/health

      - name: Health check — productivity-service
        run: curl --fail --retry 5 --retry-delay 3 http://localhost:8003/health

      - name: Health check — finance-service
        run: curl --fail --retry 5 --retry-delay 3 http://localhost:8004/health

      - name: Health check — habit-service
        run: curl --fail --retry 5 --retry-delay 3 http://localhost:8005/health

      - name: Health check — analytics-service
        run: curl --fail --retry 5 --retry-delay 3 http://localhost:8006/health

      - name: Health check — recommendation-service
        run: curl --fail --retry 5 --retry-delay 3 http://localhost:8007/health

      - name: Health check — notification-service
        run: curl --fail --retry 5 --retry-delay 3 http://localhost:8008/health

      - name: Health check — rag-service
        run: curl --fail --retry 5 --retry-delay 3 http://localhost:8009/health

      - name: Health check — career-service
        run: curl --fail --retry 5 --retry-delay 3 http://localhost:8010/health

      - name: Health check — integrations-service
        run: curl --fail --retry 5 --retry-delay 3 http://localhost:8011/health

      - name: Health check — automation-service
        run: curl --fail --retry 5 --retry-delay 3 http://localhost:8012/health

      - name: Print service logs on failure
        if: failure()
        run: docker-compose logs --tail=50

      - name: Tear down
        if: always()
        run: docker-compose down -v
