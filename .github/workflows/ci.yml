name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ══════════════════════════════════════════════════════════════
# STAGE 1 — FRONTEND
# install → lint → type-check → build
# ══════════════════════════════════════════════════════════════
jobs:
  frontend-install:
    name: "Frontend › Install"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  frontend-lint:
    name: "Frontend › Lint"
    runs-on: ubuntu-latest
    needs: frontend-install
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install (if cache miss)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  frontend-type-check:
    name: "Frontend › Type Check"
    runs-on: ubuntu-latest
    needs: frontend-install
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install (if cache miss)
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

  frontend-build:
    name: "Frontend › Build"
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-type-check]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install (if cache miss)
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_URL: http://localhost:3001

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.next
          retention-days: 1

# ══════════════════════════════════════════════════════════════
# STAGE 2 — BACKEND SERVICES (run in parallel, each isolated)
# ══════════════════════════════════════════════════════════════

  auth-service:
    name: "Backend › auth-service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/auth-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff mypy

      - name: Lint (ruff)
        run: ruff check src/

      - name: Format check (ruff)
        run: ruff format --check src/

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports

      - name: Verify app starts
        run: |
          uvicorn src.main:app --host 0.0.0.0 --port 8001 &
          PID=$!
          sleep 3
          curl --fail http://localhost:8001/health || (kill $PID && exit 1)
          kill $PID

