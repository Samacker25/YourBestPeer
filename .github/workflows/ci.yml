# ══════════════════════════════════════════════════════════════
# STAGE 3 — INTEGRATION (docker-compose, all services + health)
# Runs only after ALL frontend + backend jobs pass
# ══════════════════════════════════════════════════════════════

  career-service:
    name: "Backend › career-service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/career-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
