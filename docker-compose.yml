version: "3.9"

services:
  # ─── Infrastructure ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lifeos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lifeos_dev}
      POSTGRES_DB: ${POSTGRES_DB:-lifeos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifeos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Dev Tools ────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis

  # Pinecone is a managed cloud service — no local container needed.
  # Set PINECONE_API_KEY and PINECONE_INDEX_NAME in your .env file.

  # ─── Backend Services ──────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD:-lifeos_dev}@postgres:5432/${POSTGRES_DB:-lifeos}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      JWT_ALGORITHM: HS256
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-agent-service:
    build:
      context: ./services/ai-agent-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD:-lifeos_dev}@postgres:5432/${POSTGRES_DB:-lifeos}
      REDIS_URL: redis://redis:6379
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_ENVIRONMENT: ${PINECONE_ENVIRONMENT:-us-east-1-aws}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-lifeos}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-yourbestpeer}
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
      PRODUCTIVITY_SERVICE_URL: http://productivity-service:8003
      HABIT_SERVICE_URL: http://habit-service:8005
      FINANCE_SERVICE_URL: http://finance-service:8004
      RAG_SERVICE_URL: http://rag-service:8009
      CAREER_SERVICE_URL: http://career-service:8010
    depends_on:
      - postgres
      - redis

  productivity-service:
    build:
      context: ./services/productivity-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD:-lifeos_dev}@postgres:5432/${POSTGRES_DB:-lifeos}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy

  finance-service:
    build:
      context: ./services/finance-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD:-lifeos_dev}@postgres:5432/${POSTGRES_DB:-lifeos}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy

  habit-service:
    build:
      context: ./services/habit-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD:-lifeos_dev}@postgres:5432/${POSTGRES_DB:-lifeos}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD:-lifeos_dev}@postgres:5432/${POSTGRES_DB:-lifeos}
      REDIS_URL: redis://redis:6379
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  recommendation-service:
    build:
      context: ./services/recommendation-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8007:8007"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD:-lifeos_dev}@postgres:5432/${POSTGRES_DB:-lifeos}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8008:8008"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD:-lifeos_dev}@postgres:5432/${POSTGRES_DB:-lifeos}
      REDIS_URL: redis://redis:6379
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  rag-service:
    build:
      context: ./services/rag-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8009:8009"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD:-lifeos_dev}@postgres:5432/${POSTGRES_DB:-lifeos}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_ENVIRONMENT: ${PINECONE_ENVIRONMENT:-us-east-1-aws}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-lifeos}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    depends_on:
      - postgres

  career-service:
    build:
      context: ./services/career-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8010:8010"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD:-lifeos_dev}@postgres:5432/${POSTGRES_DB:-lifeos}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      JWT_ALGORITHM: HS256
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  integrations-service:
    build:
      context: ./services/integrations-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8011:8011"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD:-lifeos_dev}@postgres:5432/${POSTGRES_DB:-lifeos}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      JWT_ALGORITHM: HS256
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy

  automation-service:
    build:
      context: ./services/automation-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8012:8012"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD:-lifeos_dev}@postgres:5432/${POSTGRES_DB:-lifeos}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      JWT_ALGORITHM: HS256
      NOTIFICATION_SERVICE_URL: http://notification-service:8008
      PRODUCTIVITY_SERVICE_URL: http://productivity-service:8003
      HABIT_SERVICE_URL: http://habit-service:8005
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
